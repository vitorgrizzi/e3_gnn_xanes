defaults:
  - _self_

model:
  max_z: 92     # maximum atomic number the model can handle, sets the size of AtomicEmbedding lookup table
  num_layers: 3 # number of message passing layers
  lmax: 2       # maximum angular momentum
  mul_0: 64     # number of basis functions for l=0
  mul_1: 32     # number of basis functions for l=1
  mul_2: 16     # number of basis functions for l=2
  r_max: 5.0    # maximum radius
  num_radial: 12 # number of Gaussian radial basis functions used to encode interatomic distances during message passing
  basis_scales: [0.1, 0.5, 1.0] # scales of readout Gaussian basis functions
  num_basis: 128                # number of readout Gaussian basis functions (coeffs)
  emin: -30.0
  emax: 100.0
  num_energy_points: 150
  dropout: 0.1
  # emin, emax, num_energy_points must match the values used in the dataset creation

training:
  lr: 5e-4
  batch_size: 4
  epochs: 100
  weight_decay: 0.05
  lambda_grad: 0.5
  patience: 15
  grad_clip: 5.0
  save_path: "best_model.pt"
  load_path: null
  log_path: "training.log"
  device: "auto"
  num_val_samples: 6 # Number of validation plots to generate after training, set to 0 to disable

data:
  root: "/lcrc/globalscratch/vferreiragrizzi/gnn_xanes/"
  db_path: null # path to xanes_dataset.db (set via CLI or override)
  processed_path: null # direct path to .pt file (set via CLI or override)
  num_workers: 0
  r_max: 5.0
  preprocess: false

wandb:
  project: "xanes_e3gnn"
  entity: null
  mode: "disabled" # set to 'disabled' to turn off wandb
